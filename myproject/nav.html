<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Side Panel Menu</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }
  .toggle-btn {
    position: fixed;
    top: 10px;
    right: 10px;
    padding: 10px 15px;
    background-color: #333;
    color: white;
    border: none;
    cursor: pointer;
    transition: background-color 0.3s ease;
    font-size: 16px;
  }
  .toggle-btn.active {
    background-color: red;
  }
  .side-panel {
    position: fixed;
    top: 0;
    left: -20%;
    width: 20%;
    height: 100vh;
    background-color: #222;
    box-shadow: 2px 0 5px rgba(0,0,0,0.3);
    transition: left 0.3s ease;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    align-items: center;
  }
  .side-panel.active {
    left: 0;
  }
  .menu-item {
    color: white;
    text-decoration: none;
    font-size: 20px;
    transition: 0.2s;
  }
  .menu-item:hover {
    color: #00bcd4;
    transform: scale(1.1);
  }
</style>
</head>
<body>

<button id="menuBtn" class="toggle-btn" onclick="togglePanel()">Menu</button>

<div id="panel" class="side-panel">
  <a href="#" class="menu-item">Home</a>
  <a href="#" class="menu-item">About</a>
  <a href="#" class="menu-item">Services</a>
  <a href="#" class="menu-item">Portfolio</a>
  <a href="#" class="menu-item">Contact</a>
</div>

<script>
  function togglePanel() {
    const panel = document.getElementById("panel");
    const btn = document.getElementById("menuBtn");
    panel.classList.toggle("active");
    btn.classList.toggle("active");
    btn.textContent = btn.classList.contains("active") ? "✖" : "Menu";
  }
</script>

</body>
</html>
